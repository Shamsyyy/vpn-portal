name: Sync server data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install paramiko

      - name: Export portal data
        env:
          SSH_PASS_SHM: ${{ secrets.SSH_PASS_SHM }}
          SSH_PASS_EVKA: ${{ secrets.SSH_PASS_EVKA }}
        run: |
          python3 scripts/export_portal_data_ci.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/manifest.json data/shm137.json data/evka.json
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: sync server data"
            git push
          fi
