name: Sync server data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: portal-data-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install paramiko

      - name: Export and push portal data
        env:
          SSH_PASS_SHM: ${{ secrets.SSH_PASS_SHM }}
          SSH_PASS_EVKA: ${{ secrets.SSH_PASS_EVKA }}
        run: |
          chmod +x scripts/git_push_portal_data.sh
          scripts/git_push_portal_data.sh "chore: sync server data" 5 \
            "python3 scripts/export_portal_data_ci.py"
