name: Apply portal changes

on:
  push:
    paths:
      - data/overrides.json
  workflow_dispatch:
    inputs:
      payload_b64:
        description: Base64-encoded overrides JSON from portal
        required: false

concurrency:
  group: portal-data-push
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install paramiko

      - name: Write overrides from portal dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.payload_b64 != ''
        run: python3 -c "import base64, pathlib; pathlib.Path('data').mkdir(exist_ok=True); pathlib.Path('data/overrides.json').write_bytes(base64.b64decode('${{ inputs.payload_b64 }}'))"

      - name: Verify SSH secrets
        run: |
          if [ -z "${{ secrets.SSH_PASS_SHM }}" ] || [ -z "${{ secrets.SSH_PASS_EVKA }}" ]; then
            echo "::error::Add GitHub secrets SSH_PASS_SHM and SSH_PASS_EVKA in Settings → Secrets → Actions"
            exit 1
          fi

      - name: Apply overrides to servers
        if: hashFiles('data/overrides.json') != ''
        env:
          SSH_PASS_SHM: ${{ secrets.SSH_PASS_SHM }}
          SSH_PASS_EVKA: ${{ secrets.SSH_PASS_EVKA }}
        run: python3 scripts/apply_changes_ci.py

      - name: Re-export data after apply
        env:
          SSH_PASS_SHM: ${{ secrets.SSH_PASS_SHM }}
          SSH_PASS_EVKA: ${{ secrets.SSH_PASS_EVKA }}
        run: python3 scripts/export_portal_data_ci.py

      - name: Clear applied overrides queue
        run: |
          python3 -c "import json, datetime; from pathlib import Path; p=Path('data/overrides.json'); p.parent.mkdir(exist_ok=True); p.write_text(json.dumps({'updatedAt': datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'), 'servers': {}}, indent=2)+'\n', encoding='utf-8')"

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "chore: refresh data after apply"
          git pull --rebase origin main
          git push
