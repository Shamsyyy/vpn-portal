name: Probe VPN tunnels

on:
  workflow_dispatch:
    inputs:
      server:
        description: "shm137 | evka | all"
        required: true
        default: "all"
      email:
        description: "Client email or all"
        required: true
        default: "all"
      full_tunnel:
        description: "1 = all inbounds, 0 = xHTTP only"
        required: true
        default: "1"

permissions:
  contents: write

concurrency:
  group: portal-data-push
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install paramiko

      - name: Verify SSH secrets
        run: |
          if [ -z "${{ secrets.SSH_PASS_SHM }}" ] || [ -z "${{ secrets.SSH_PASS_EVKA }}" ]; then
            echo "::error::Add secrets SSH_PASS_SHM and SSH_PASS_EVKA"
            exit 1
          fi

      - name: Run VPN probes and push results
        env:
          SSH_PASS_SHM: ${{ secrets.SSH_PASS_SHM }}
          SSH_PASS_EVKA: ${{ secrets.SSH_PASS_EVKA }}
        run: |
          chmod +x scripts/git_push_portal_data.sh
          SERVER="${{ inputs.server }}"
          EMAIL="${{ inputs.email }}"
          FULL="${{ inputs.full_tunnel }}"
          scripts/git_push_portal_data.sh "chore: VPN probe results (${SERVER} / ${EMAIL})" 5 \
            "python3 scripts/probe_portal_ci.py '${SERVER}' '${EMAIL}' '${FULL}'"
